<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #fffdf3; padding: 15px; }
        .page-title { font-size: 18px; color: #004097; margin-bottom: 20px; font-weight: bold; }
        .apps-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .app-item { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .app-icon { width: 50px; height: 50px; border-radius: 10px; background: #f0f7ff; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
        .app-icon svg { width: 28px; height: 28px; fill: #004097; }
        .app-name { font-size: 13px; color: #3b3c50; }
    </style>
</head>
<body>
    <div class="page-title">应用中心</div>
    <div class="apps-list">
        <div class="app-item">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
            </div>
            <div class="app-name">课程表</div>
        </div>
        <div class="app-item">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14h-2v-2h2v2zm3-4h-2V7h2v6z"/></svg>
            </div>
            <div class="app-name">成绩查询</div>
        </div>
        <div class="app-item">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
            </div>
            <div class="app-name">校园地图</div>
        </div>
        <div class="app-item">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm6 12h-2v-2h2v2zm0-4h-2V9h2v6zm4 4h-2v-2h2v2zm0-4h-2V9h2v6zm4 4h-2v-2h2v2zm0-4h-2V9h2v6z"/></svg>
            </div>
            <div class="app-name">图书馆</div>
        </div>
        <div class="app-item">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M15 10.6V5c0-1.1-.9-2-2-2h-2c-1.1 0-2 .9-2 2v5.6c-1.2.4-2 1.5-2 2.8v.6c0 1.7 1.3 3 3 3h4c1.7 0 3-1.3 3-3v-.6c0-1.3-.8-2.4-2-2.8zm-2 1.4c-.8 0-1.5-.7-1.5-1.5S12.2 9 13 9s1.5.7 1.5 1.5S13.8 12 13 12z"/></svg>
            </div>
            <div class="app-name">校园卡</div>
        </div>
        <div class="app-item">
            <div class="app-icon">
                <svg viewBox="0 0 24 24"><path d="M19 3h-4.18C14.4 1.84 13.3 1 12 1c-1.3 0-2.4.84-2.82 2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 0c.55 0 1 .45 1 1s-.45 1-1 1-1-.45-1-1 .45-1 1-1zm2 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            </div>
            <div class="app-name">请假申请</div>
        </div>
    </div>
</body>
</html>
