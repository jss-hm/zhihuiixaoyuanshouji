<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园信息</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Microsoft YaHei", sans-serif; background: #fffdf3; padding: 15px; }
        .page-title { font-size: 18px; color: #004097; margin-bottom: 20px; font-weight: bold; }
        .info-card { background: #fff; border-radius: 10px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .info-title { font-size: 15px; color: #3b3c50; font-weight: bold; margin-bottom: 8px; display: flex; align-items: center; }
        .info-title::before { content: ""; width: 4px; height: 16px; background: #004097; margin-right: 8px; border-radius: 2px; }
        .info-content { font-size: 13px; color: #666; line-height: 1.6; }
        .info-time { font-size: 12px; color: #999; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="page-title">校园公告</div>
    <div class="info-card">
        <div class="info-title">期中考试通知</div>
        <div class="info-content">11月15日进行期中考试，请各位同学携带学生证、准考证准时参加，遵守考场纪律。</div>
        <div class="info-time">发布时间：2025-11-01</div>
    </div>
    <div class="info-card">
        <div class="info-title">校园招聘会</div>
        <div class="info-content">11月20日体育馆举办2026届毕业生招聘会，欢迎各年级学生前往了解企业信息、投递简历。</div>
        <div class="info-time">发布时间：2025-10-28</div>
    </div>
    <div class="info-card">
        <div class="info-title">图书馆闭馆通知</div>
        <div class="info-content">11月8日图书馆将进行系统维护，当天闭馆一天，给您带来不便敬请谅解。</div>
        <div class="info-time">发布时间：2025-10-25</div>
    </div>
    <div class="info-card">
        <div class="info-title">校园安全演练</div>
        <div class="info-content">11月12日下午2点将进行校园消防演练，请各班级按指定路线有序疏散。</div>
        <div class="info-time">发布时间：2025-10-20</div>
    </div>
</body>
</html>
