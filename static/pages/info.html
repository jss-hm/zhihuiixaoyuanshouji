<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        /* 卡片样式 */
        .card {
            background: #fffdf3;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            transition: transform 0.2s;
            border: 1px solid #00409720;
        }
        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 64, 151, 0.15);
        }
        .card h3 {
            color: #004097;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .card p {
            color: #3b3c50;
            line-height: 1.5;
            font-size: 14px;
        }
        .section-link {
            color: #3498db;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            display: inline-block;
            margin-top: 8px;
        }
        .section-link:hover {
            text-decoration: underline;
        }
        .announcement-time {
            color: #999;
            font-size: 12px;
            text-align: right;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h3>通知公告</h3>
        {% for ann in announcements %}
            <div style="margin-bottom: 10px; padding-bottom: 10px; border-bottom: 1px solid #f5f5f5;">
                <p style="font-size: 14px; color: #333;">{{ ann.title }}</p>
                <p style="font-size: 13px; color: #666; margin-bottom: 5px;">{{ ann.content }}</p>
                <div class="announcement-time">{{ ann.time }}</div>
            </div>
        {% endfor %}
        <a href="#" class="section-link">查看全部 →</a>
    </div>
    <div class="card">
        <h3>校园新闻</h3>
        <p>我校代表队在全国大学生竞赛中斩获金奖<br>
           校园秋季运动会筹备工作启动<br>
           新校区建设项目进展顺利</p>
        <a href="#" class="section-link">更多新闻 →</a>
    </div>
    <div class="card">
        <h3>学术活动</h3>
        <p>9月20日 人工智能前沿讲座（主讲人：李教授）<br>
           9月25日 学术研讨会：数字经济与未来发展</p>
        <a href="#" class="section-link">预约参加 →</a>
    </div>
</body>
</html>
